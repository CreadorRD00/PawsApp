<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawsApp - Control de Vacunas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; padding: 20px; margin: 0; }
        header { text-align: center; padding: 10px 0; border-bottom: 1px solid #222; }
        h2 { color: #f5f5f5; margin-bottom: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 14px; margin-bottom: 15px; border: 1px solid #2a2a2a; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .pet-name { font-size: 20px; font-weight: bold; margin: 0 0 8px 0; color: #ff9f43; }
        .info { font-size: 14px; color: #aaa; margin: 5px 0; }
        .badge { display: inline-block; background: #ff4757; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 10px; }
        .badge.ok { background: #2ed573; }
    </style>
</head>
<body>
    <header>
        <h1>🐾 PawsApp</h1>
    </header>
    <div class="container">
        <h2>Mis Mascotas</h2>
        
        <div class="card">
            <p class="pet-name">Khloé</p>
            <p class="info"><strong>Próxima vacuna:</strong> Parvovirus</p>
            <span class="badge">Pendiente - 15 Jul</span>
        </div>

    </div>
</body>
</html>
