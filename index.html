<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawsApp - Control de Vacunas</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #121212; color: #fff; padding: 20px; margin: 0; }
        header { text-align: center; padding: 15px 0; border-bottom: 1px solid #222; }
        h1 { margin: 0; color: #ff9f43; font-size: 26px; }
        h2 { color: #f5f5f5; font-size: 20px; margin-top: 25px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Formulario */
        .form-group { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #2a2a2a; margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
        input { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; border-radius: 8px; color: #fff; box-sizing: border-box; margin-bottom: 12px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #2ed573; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { background: #26af5f; }

        /* Tarjetas de Mascotas */
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #2a2a2a; position: relative; }
        .pet-name { font-size: 18px; font-weight: bold; margin: 0 0 5px 0; color: #ff9f43; }
        .info { font-size: 14px; color: #ccc; margin: 4px 0; }
        .badge { display: inline-block; background: #ff4757; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .btn-delete { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #ff4757; font-size: 14px; width: auto; padding: 0; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>🐾 PawsApp</h1>
    </header>
    
    <div class="container">
        <!-- Formulario para agregar -->
        <h2>+ Registrar Vacuna</h2>
        <div class="form-group">
            <label for="petName">Nombre de la Mascota:</label>
            <input type="text" id="petName" placeholder="Ej. Khloé">
            
            <label for="vaccine">Vacuna:</label>
            <input type="text" id="vaccine" placeholder="Ej. Parvovirus, Rabia">
            
            <label for="vacDate">Fecha de Próxima Vacuna:</label>
            <input type="date" id="vacDate">
            
            <button onclick="agregarMascota()">Guardar Registro</button>
        </div>

        <!-- Lista de mascotas -->
        <h2>Mis Mascotas</h2>
        <div id="listaMascotas"></div>
    </div>

    <script>
        // Cargar datos al abrir la app
        document.addEventListener('DOMContentLoaded', mostrarMascotas);

        function agregarMascota() {
            const nombre = document.getElementById('petName').value;
            const vacuna = document.getElementById('vaccine').value;
            const fecha = document.getElementById('vacDate').value;

            if(!nombre || !vacuna || !fecha) {
                alert('Por favor, llena todos los campos.');
                return;
            }

            const nuevaMascota = { id: Date.now(), nombre, vacuna, fecha };
            let mascotas = JSON.parse(localStorage.getItem('mascotas')) || [];
            mascotas.push(nuevaMascota);
            localStorage.setItem('mascotas', JSON.stringify(mascotas));

            // Limpiar formulario
            document.getElementById('petName').value = '';
            document.getElementById('vaccine').value = '';
            document.getElementById('vacDate').value = '';

            mostrarMascotas();
        }

        function mostrarMascotas() {
            const lista = document.getElementById('listaMascotas');
            lista.innerHTML = '';
            const mascotas = JSON.parse(localStorage.getItem('mascotas')) || [];

            if(mascotas.length === 0) {
                lista.innerHTML = '<p style="color: #666; text-align: center;">No hay mascotas registradas aún.</p>';
                return;
            }

            mascotas.forEach(m => {
                // Formatear la fecha a algo más legible (DD/MM/AAAA)
                const fechaFormateada = m.fecha.split('-').reverse().join('/');
                
                lista.innerHTML += `
                    <div class="card">
                        <p class="pet-name">${m.nombre}</p>
                        <p class="info"><strong>Vacuna:</strong> ${m.vacuna}</p>
                        <span class="badge">Próxima: ${fechaFormateada}</span>
                        <button class="btn-delete" onclick="eliminarMascota(${m.id})">Eliminar</button>
                    </div>
                `;
            });
        }

        function eliminarMascota(id) {
            let mascotas = JSON.parse(localStorage.getItem('mascotas')) || [];
            mascotas = mascotas.filter(m => m.id !== id);
            localStorage.setItem('mascotas', JSON.stringify(mascotas));
            mostrarMascotas();
        }
    </script>
</body>
</html>
